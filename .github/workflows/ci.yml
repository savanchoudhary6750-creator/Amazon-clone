name: MERN Stack CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install server dependencies
        run: |
          cd server
          npm ci
      - name: Run server lint
        run: |
          cd server
          npm run lint --if-present
      - name: Run server tests
        run: |
          cd server
          npm test --if-present

  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install client dependencies
        run: |
          cd client
          npm ci
      - name: Build client
        run: |
          cd client
          npm run build
